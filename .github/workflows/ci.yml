name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # `.npmrc` carries `legacy-peer-deps=true`; the explicit
      # flag is belt-and-suspenders so a future contributor
      # removing `.npmrc` does not break the build.
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm test
  build-image:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t a1-smb-crm-hy-max-web:${{ github.sha }} .
